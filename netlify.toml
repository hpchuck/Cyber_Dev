# Netlify configuration for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build settings
[build]
  publish = "dist"
  command = "npm run build"

# Environment variables (if needed)
[build.environment]
  NODE_VERSION = "18"

[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

# Headers for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
